<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>My Vocabulary Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #5B4FCF;
            --primary-light: #7C6FE8;
            --bg: #F8F7FF;
            --card-bg: #FFFFFF;
            --text: #2D2B3A;
            --text-light: #6B6880;
            --border: #E8E6F0;
            --success: #4CAF50;
            --shadow: 0 2px 12px rgba(91, 79, 207, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 24px 20px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(91, 79, 207, 0.3);
        }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.95);
            color: var(--text);
            outline: none;
        }
        .search-box input::placeholder { color: #999; }
        .search-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-box button:active { background: rgba(255,255,255,0.3); }
        .stats {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            overflow-x: auto;
        }
        .stat-chip {
            background: var(--card-bg);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-light);
            box-shadow: var(--shadow);
            white-space: nowrap;
        }
        .stat-chip strong { color: var(--primary); }
        .alpha-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px 20px 12px;
            justify-content: center;
        }
        .alpha-nav button {
            width: 32px; height: 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-light);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .alpha-nav button.has-words { color: var(--primary); border-color: var(--primary); background: #F0EEFF; }
        .alpha-nav button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .content { padding: 0 16px; }
        .word-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .word-card h2 { font-size: 20px; color: var(--primary); margin-bottom: 4px; }
        .word-meta { font-size: 13px; color: var(--text-light); margin-bottom: 12px; }
        .word-meta span { margin-right: 12px; }
        .definition { margin-bottom: 10px; padding-left: 12px; border-left: 2px solid var(--border); }
        .definition .pos { font-size: 12px; font-weight: 600; color: var(--primary-light); text-transform: uppercase; margin-bottom: 4px; }
        .definition .meaning { font-size: 15px; margin-bottom: 4px; }
        .definition .example { font-size: 14px; color: var(--text-light); font-style: italic; }
        .word-card .delete-btn {
            float: right;
            background: none;
            border: none;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .word-card .delete-btn:hover { color: #e74c3c; }
        .loading { text-align: center; padding: 40px; color: var(--text-light); }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { margin-bottom: 8px; color: var(--text); }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .section-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            padding: 16px 4px 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📖 My Vocabulary Register</h1>
        <div class="search-box">
            <input type="text" id="wordInput" placeholder="Type a word to look up..." autocomplete="off" autocapitalize="none">
            <button onclick="lookupWord()">Define</button>
        </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="alpha-nav" id="alphaNav"></div>
    <div class="content" id="content"></div>
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = 'https://api.dictionaryapi.dev/api/v2/entries/en/';
        let vocabulary = JSON.parse(localStorage.getItem('vocabRegister') || '{}');
        let activeFilter = null;

        document.getElementById('wordInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') lookupWord();
        });
        renderAll();

        async function lookupWord() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim().toLowerCase();
            if (!word) return;

            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div>Looking up "' + word + '"...</div>';

            try {
                const res = await fetch(API_URL + encodeURIComponent(word));
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();

                const entry = {
                    word: data[0].word,
                    phonetic: data[0].phonetic || (data[0].phonetics && data[0].phonetics.find(p => p.text)?.text) || '',
                    meanings: data[0].meanings.map(m => ({
                        partOfSpeech: m.partOfSpeech,
                        definitions: m.definitions.slice(0, 3).map(d => ({
                            definition: d.definition,
                            example: d.example || ''
                        }))
                    })),
                    dateAdded: new Date().toISOString().split('T')[0]
                };

                const letter = entry.word[0].toLowerCase();
                if (!vocabulary[letter]) vocabulary[letter] = [];
                const existing = vocabulary[letter].findIndex(v => v.word === entry.word);
                if (existing >= 0) {
                    vocabulary[letter][existing] = entry;
                    showToast('Updated: ' + entry.word);
                } else {
                    vocabulary[letter].push(entry);
                    vocabulary[letter].sort((a, b) => a.word.localeCompare(b.word));
                    showToast('✓ Added: ' + entry.word);
                }
                localStorage.setItem('vocabRegister', JSON.stringify(vocabulary));
                input.value = '';
                activeFilter = letter;
                renderAll();
            } catch (err) {
                content.innerHTML = '<div class="empty-state"><div class="icon">🤷</div><h3>Word not found</h3><p>Could not find "' + word + '" in the dictionary. Check spelling and try again.</p></div>';
            }
        }

        function deleteWord(letter, index) {
            if (confirm('Remove "' + vocabulary[letter][index].word + '" from your register?')) {
                vocabulary[letter].splice(index, 1);
                if (vocabulary[letter].length === 0) delete vocabulary[letter];
                localStorage.setItem('vocabRegister', JSON.stringify(vocabulary));
                renderAll();
                showToast('Word removed');
            }
        }

        function renderAll() {
            renderStats();
            renderAlphaNav();
            renderWords();
        }

        function renderStats() {
            const total = Object.values(vocabulary).reduce((sum, arr) => sum + arr.length, 0);
            const letters = Object.keys(vocabulary).length;
            const recent = Object.values(vocabulary).flat().filter(w => {
                const d = new Date(w.dateAdded);
                const now = new Date();
                return (now - d) < 7 * 24 * 60 * 60 * 1000;
            }).length;
            document.getElementById('stats').innerHTML =
                '<div class="stat-chip"><strong>' + total + '</strong> words</div>' +
                '<div class="stat-chip"><strong>' + letters + '</strong> letters</div>' +
                '<div class="stat-chip"><strong>' + recent + '</strong> this week</div>';
        }

        function renderAlphaNav() {
            const nav = document.getElementById('alphaNav');
            nav.innerHTML = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l => {
                const lower = l.toLowerCase();
                const has = vocabulary[lower] && vocabulary[lower].length > 0;
                const active = activeFilter === lower;
                return '<button class="' + (has ? 'has-words ' : '') + (active ? 'active' : '') + '" onclick="filterLetter('' + lower + '')">' + l + '</button>';
            }).join('');
        }

        function filterLetter(letter) {
            activeFilter = activeFilter === letter ? null : letter;
            renderAll();
        }

        function renderWords() {
            const content = document.getElementById('content');
            const letters = activeFilter ? [activeFilter] : Object.keys(vocabulary).sort();

            if (letters.length === 0 || letters.every(l => !vocabulary[l] || vocabulary[l].length === 0)) {
                content.innerHTML = '<div class="empty-state"><div class="icon">📚</div><h3>Your register is empty</h3><p>Type a word above and tap "Define" to start building your vocabulary!</p></div>';
                return;
            }

            let html = '';
            letters.forEach(letter => {
                if (!vocabulary[letter] || vocabulary[letter].length === 0) return;
                html += '<div class="section-header">' + letter.toUpperCase() + ' (' + vocabulary[letter].length + ')</div>';
                vocabulary[letter].forEach((entry, idx) => {
                    html += '<div class="word-card">';
                    html += '<button class="delete-btn" onclick="deleteWord('' + letter + '', ' + idx + ')">&times;</button>';
                    html += '<h2>' + entry.word + '</h2>';
                    html += '<div class="word-meta"><span>' + entry.phonetic + '</span><span>Added ' + entry.dateAdded + '</span></div>';
                    entry.meanings.forEach(m => {
                        m.definitions.forEach(d => {
                            html += '<div class="definition">';
                            html += '<div class="pos">' + m.partOfSpeech + '</div>';
                            html += '<div class="meaning">' + d.definition + '</div>';
                            if (d.example) html += '<div class="example">"' + d.example + '"</div>';
                            html += '</div>';
                        });
                    });
                    html += '</div>';
                });
            });
            content.innerHTML = html;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
