<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vocabulary Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 4px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 20px; }
        .search-box { position: relative; margin-bottom: 16px; }
        .search-box input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid #333; background: #1a1a2e; color: #fff; font-size: 1rem; outline: none; }
        .search-box input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .btn-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-define { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-slang { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; }
        .result-card { background: #1a1a2e; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #2a2a4a; }
        .result-card h3 { color: #667eea; margin-bottom: 4px; font-size: 1.1rem; }
        .phonetic { color: #888; font-size: 0.85rem; margin-bottom: 10px; font-style: italic; }
        .source-badge { display: inline-block; font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; font-weight: 600; }
        .source-dict { background: #1e3a5f; color: #64b5f6; }
        .source-wiki { background: #1e4a3a; color: #64f6b5; }
        .source-slang { background: #4a1e3a; color: #f664b5; }
        .meaning { margin-bottom: 12px; padding-left: 12px; border-left: 3px solid #333; }
        .part-of-speech { color: #f093fb; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
        .definition { margin-bottom: 6px; font-size: 0.9rem; line-height: 1.4; }
        .example { color: #aaa; font-size: 0.85rem; font-style: italic; padding-left: 8px; border-left: 2px solid #444; margin-top: 4px; }
        .save-btn { display: block; width: 100%; margin-top: 12px; padding: 10px; border: none; border-radius: 8px; background: #2d4a2d; color: #7ddb7d; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        .save-btn:hover { background: #3d5a3d; }
        .save-btn.saved { background: #1a3a1a; color: #4a8a4a; cursor: default; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .stat { background: #1a1a2e; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #2a2a4a; }
        .stat-num { font-size: 1.3rem; font-weight: 700; color: #667eea; }
        .stat-label { font-size: 0.7rem; color: #888; margin-top: 2px; }
        .alphabet { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; justify-content: center; }
        .alpha-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #888; font-size: 0.75rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .alpha-btn.has-words { background: #1e1e3e; color: #667eea; border-color: #667eea; }
        .alpha-btn.active { background: #667eea; color: white; }
        .register-section { margin-bottom: 16px; }
        .letter-header { font-size: 1.2rem; font-weight: 700; color: #764ba2; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 2px solid #2a2a4a; }
        .word-entry { background: #1a1a2e; border-radius: 10px; padding: 12px; margin-bottom: 8px; border: 1px solid #2a2a4a; }
        .word-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .word-entry h4 { color: #667eea; font-size: 0.95rem; }
        .word-entry .date { font-size: 0.7rem; color: #666; }
        .word-entry .def-text { font-size: 0.85rem; color: #ccc; line-height: 1.4; margin-bottom: 4px; }
        .word-entry .ex-text { font-size: 0.8rem; color: #999; font-style: italic; }
        .delete-btn { background: none; border: none; color: #f5576c; cursor: pointer; font-size: 1rem; padding: 4px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #1a1a2e; border-radius: 10px; padding: 4px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: #888; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-align: center; }
        .tab.active { background: #667eea; color: white; }
        .loading { text-align: center; color: #888; padding: 20px; }
        .error { background: #2a1a1a; border: 1px solid #4a2a2a; border-radius: 10px; padding: 12px; color: #f5576c; font-size: 0.85rem; margin-bottom: 12px; }
        .empty { text-align: center; color: #666; padding: 40px 20px; font-size: 0.9rem; }
        .slang-note { font-size: 0.75rem; color: #f093fb; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Vocabulary Register</h1>
        <p class="subtitle">Your personal word collection</p>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">🔍 Look Up</button>
            <button class="tab" onclick="switchTab('register')">📚 My Words</button>
        </div>

        <div id="search-tab">
            <div class="search-box">
                <input type="text" id="wordInput" placeholder="Enter a word or phrase..." autocomplete="off" />
            </div>
            <div class="btn-row">
                <button class="btn btn-define" onclick="lookupWord()">📖 Define</button>
                <button class="btn btn-slang" onclick="lookupSlang()">🗣️ Slang</button>
            </div>
            <div id="results"></div>
        </div>

        <div id="register-tab" style="display:none;">
            <div class="stats">
                <div class="stat"><div class="stat-num" id="totalWords">0</div><div class="stat-label">Total Words</div></div>
                <div class="stat"><div class="stat-num" id="lettersUsed">0</div><div class="stat-label">Letters</div></div>
                <div class="stat"><div class="stat-num" id="thisWeek">0</div><div class="stat-label">This Week</div></div>
            </div>
            <div class="alphabet" id="alphabet"></div>
            <div id="wordList"></div>
        </div>
    </div>

    <script>
        let vocabulary = JSON.parse(localStorage.getItem("vocabRegister") || "{}");
        let currentFilter = null;

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            if (tab === "search") {
                document.getElementById("search-tab").style.display = "block";
                document.getElementById("register-tab").style.display = "none";
                document.querySelectorAll(".tab")[0].classList.add("active");
            } else {
                document.getElementById("search-tab").style.display = "none";
                document.getElementById("register-tab").style.display = "block";
                document.querySelectorAll(".tab")[1].classList.add("active");
                renderRegister();
            }
        }

        // Enter key support
        document.getElementById("wordInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") lookupWord();
        });

        // === DICTIONARY LOOKUP (Multi-source) ===
        async function lookupWord() {
            const word = document.getElementById("wordInput").value.trim().toLowerCase();
            if (!word) return;
            document.getElementById("results").innerHTML = '<div class="loading">Looking up "<strong>' + word + '</strong>"...</div>';

            let result = await tryFreeDictionary(word);
            if (!result) result = await tryWiktionary(word);
            if (!result) {
                document.getElementById("results").innerHTML = '<div class="error">Could not find "<strong>' + word + '</strong>" in any dictionary. Try the Slang button for informal terms, or check your spelling.</div>';
                return;
            }
            displayResult(result);
        }

        // Source 1: Free Dictionary API
        async function tryFreeDictionary(word) {
            try {
                const res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(word));
                if (!res.ok) return null;
                const data = await res.json();
                const entry = data[0];
                let meanings = [];
                entry.meanings.forEach(m => {
                    m.definitions.slice(0, 3).forEach(d => {
                        meanings.push({ partOfSpeech: m.partOfSpeech, definition: d.definition, example: d.example || null });
                    });
                });
                return { word: entry.word, phonetic: entry.phonetic || "", source: "dictionary", meanings };
            } catch(e) { return null; }
        }

        // Source 2: Wiktionary API (covers advanced/academic vocabulary)
        async function tryWiktionary(word) {
            try {
                const res = await fetch("https://en.wiktionary.org/api/rest_v1/page/definition/" + encodeURIComponent(word));
                if (!res.ok) return null;
                const data = await res.json();
                let meanings = [];
                if (data.en) {
                    data.en.forEach(section => {
                        section.definitions.slice(0, 3).forEach(d => {
                            let defText = d.definition.replace(/<[^>]*>/g, "");
                            let example = null;
                            if (d.examples && d.examples.length > 0) {
                                example = d.examples[0].replace(/<[^>]*>/g, "");
                            }
                            meanings.push({ partOfSpeech: section.partOfSpeech, definition: defText, example });
                        });
                    });
                }
                if (meanings.length === 0) return null;
                return { word, phonetic: "", source: "wiktionary", meanings };
            } catch(e) { return null; }
        }

        // === SLANG LOOKUP ===
        async function lookupSlang() {
            const word = document.getElementById("wordInput").value.trim().toLowerCase();
            if (!word) return;
            document.getElementById("results").innerHTML = '<div class="loading">Searching slang for "<strong>' + word + '</strong>"...</div>';
            try {
                const res = await fetch("https://api.urbandictionary.com/v0/define?term=" + encodeURIComponent(word));
                if (!res.ok) throw new Error("API error");
                const data = await res.json();
                if (!data.list || data.list.length === 0) {
                    document.getElementById("results").innerHTML = '<div class="error">No slang definitions found for "<strong>' + word + '</strong>".</div>';
                    return;
                }
                let meanings = data.list.slice(0, 4).map(item => ({
                    partOfSpeech: "slang",
                    definition: item.definition.replace(/\[|\]/g, ""),
                    example: item.example ? item.example.replace(/\[|\]/g, "") : null
                }));
                displayResult({ word, phonetic: "", source: "slang", meanings });
            } catch(e) {
                document.getElementById("results").innerHTML = '<div class="error">Failed to look up slang. Check your connection.</div>';
            }
        }

        // === DISPLAY RESULT ===
        function displayResult(result) {
            const sourceLabels = { dictionary: ["Free Dictionary", "source-dict"], wiktionary: ["Wiktionary", "source-wiki"], slang: ["Urban Dictionary", "source-slang"] };
            const [srcName, srcClass] = sourceLabels[result.source] || ["Unknown", "source-dict"];
            let html = '<div class="result-card">';
            html += '<h3>' + result.word + '</h3>';
            if (result.phonetic) html += '<div class="phonetic">' + result.phonetic + '</div>';
            html += '<span class="source-badge ' + srcClass + '">' + srcName + '</span>';
            result.meanings.forEach(m => {
                html += '<div class="meaning"><div class="part-of-speech">' + m.partOfSpeech + '</div>';
                html += '<div class="definition">' + m.definition + '</div>';
                if (m.example) html += '<div class="example">""' + m.example + '"</div>';
                html += '</div>';
            });
            const alreadySaved = vocabulary[result.word];
            html += '<button class="save-btn' + (alreadySaved ? " saved" : "") + '" onclick="saveWord(this)" data-word="' + encodeURIComponent(JSON.stringify(result)) + '">' + (alreadySaved ? "✓ Already in Register" : "💾 Save to Register") + '</button>';
            html += '</div>';
            document.getElementById("results").innerHTML = html;
        }

        // === SAVE WORD ===
        function saveWord(btn) {
            const result = JSON.parse(decodeURIComponent(btn.dataset.word));
            if (vocabulary[result.word]) return;
            vocabulary[result.word] = {
                word: result.word,
                source: result.source,
                meanings: result.meanings,
                date: new Date().toISOString()
            };
            localStorage.setItem("vocabRegister", JSON.stringify(vocabulary));
            btn.textContent = "✓ Saved!";
            btn.classList.add("saved");
        }

        // === REGISTER VIEW ===
        function renderRegister() {
            const words = Object.values(vocabulary).sort((a, b) => a.word.localeCompare(b.word));
            // Stats
            const now = new Date();
            const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
            const thisWeekCount = words.filter(w => new Date(w.date) > weekAgo).length;
            const lettersUsed = new Set(words.map(w => w.word[0])).size;
            document.getElementById("totalWords").textContent = words.length;
            document.getElementById("lettersUsed").textContent = lettersUsed;
            document.getElementById("thisWeek").textContent = thisWeekCount;

            // Alphabet bar
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const usedLetters = new Set(words.map(w => w.word[0].toUpperCase()));
            let alphaHtml = "";
            letters.forEach(l => {
                const hasWords = usedLetters.has(l);
                const isActive = currentFilter === l;
                alphaHtml += '<button class="alpha-btn' + (hasWords ? " has-words" : "") + (isActive ? " active" : "") + '" onclick="filterLetter(\'' + l + '\')">' + l + '</button>';
            });
            alphaHtml += '<button class="alpha-btn' + (currentFilter === null ? " active" : "") + '" onclick="filterLetter(null)">All</button>';
            document.getElementById("alphabet").innerHTML = alphaHtml;

            // Word list
            const filtered = currentFilter ? words.filter(w => w.word[0].toUpperCase() === currentFilter) : words;
            if (filtered.length === 0) {
                document.getElementById("wordList").innerHTML = '<div class="empty">' + (currentFilter ? "No words starting with " + currentFilter : "Your register is empty. Look up words and save them!") + '</div>';
                return;
            }
            let listHtml = "";
            let currentLetter = "";
            filtered.forEach(w => {
                const firstLetter = w.word[0].toUpperCase();
                if (firstLetter !== currentLetter) {
                    currentLetter = firstLetter;
                    listHtml += '<div class="letter-header">' + currentLetter + '</div>';
                }
                listHtml += '<div class="word-entry"><div class="word-entry-header"><h4>' + w.word + '</h4><span class="date">' + new Date(w.date).toLocaleDateString() + ' <button class="delete-btn" onclick="deleteWord(\'' + w.word + '\')">🗑️</button></span></div>';
                w.meanings.slice(0, 2).forEach(m => {
                    listHtml += '<div class="def-text"><strong>' + m.partOfSpeech + ':</strong> ' + m.definition + '</div>';
                    if (m.example) listHtml += '<div class="ex-text">""' + m.example + '"</div>';
                });
                if (w.source === "slang") listHtml += '<div class="slang-note">🗣️ Slang term</div>';
                listHtml += '</div>';
            });
            document.getElementById("wordList").innerHTML = listHtml;
        }

        function filterLetter(letter) { currentFilter = letter; renderRegister(); }

        function deleteWord(word) {
            if (confirm("Remove \"" + word + "\" from your register?")) {
                delete vocabulary[word];
                localStorage.setItem("vocabRegister", JSON.stringify(vocabulary));
                renderRegister();
            }
        }
    </script>
</body>
</html>
